<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sketchy">
<meta name="theme-color" content="#0a0f1a">
<title>Sketchy Tracker</title>
<style>
  :root {
    --bg: #0a0f1a; --bg2: #0d1424; --bg3: #111827;
    --border: #1e293b; --border2: #1e2d40;
    --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b; --xdim: #475569;
    --p1: #6366f1; --p2: #f59e0b; --p3: #10b981; --p4: #ef4444;
    --blue: #3b82f6; --gold: #c9a84c;
    --micro: #10b981; --pharm: #a78bfa; --path: #f97316;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; font-size: 13px; overflow: hidden; }
  body { padding-top: var(--safe-top); display: flex; flex-direction: column; }

  /* HEADER */
  #header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 14px 10px; flex-shrink: 0; }
  #header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  #app-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  #app-subtitle { font-size: 9.5px; color: var(--dim); margin-top: 2px; letter-spacing: 0.05em; }
  #progress-pct { font-size: 18px; font-weight: 700; color: var(--active-color, var(--p1)); line-height: 1; }
  #progress-text { font-size: 9.5px; color: var(--dim); text-align: right; margin-top: 2px; }
  #progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
  #progress-fill { height: 100%; background: linear-gradient(90deg, var(--active-color, var(--p1)), var(--active-color2, var(--p3))); border-radius: 2px; transition: width 0.4s ease; }

  /* NAV */
  #nav-bar { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  #nav-bar::-webkit-scrollbar { display: none; }
  .nav-tab { padding: 5px 10px; border-radius: 3px; font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border); white-space: nowrap; color: var(--dim); background: transparent; transition: all 0.2s; font-family: inherit; font-weight: 600; }
  .nav-tab.active { color: var(--tab-color); border-color: var(--tab-color); background: color-mix(in srgb, var(--tab-color) 14%, transparent); }

  /* BACK LINK */
  #back-link { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; color: var(--dim); text-decoration: none; padding: 4px 0; letter-spacing: 0.05em; }
  #back-link:hover { color: var(--text); }

  /* SCROLL */
  #scroll { flex: 1; overflow-y: auto; padding: 14px; padding-bottom: calc(20px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }

  /* UNIT GROUP */
  .unit-group { margin-bottom: 20px; }
  .unit-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid color-mix(in srgb, var(--source-color) 22%, transparent); }
  .unit-badge { padding: 2px 8px; font-size: 8.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--source-color); background: color-mix(in srgb, var(--source-color) 14%, transparent); border: 1px solid color-mix(in srgb, var(--source-color) 32%, transparent); border-radius: 3px; font-weight: 700; }
  .unit-count { font-size: 9.5px; color: var(--xdim); margin-left: auto; }
  .unit-progress-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 5px; overflow: hidden; }
  .unit-progress-fill { height: 100%; background: var(--source-color); border-radius: 1px; transition: width 0.3s ease; }

  /* VIDEO ROW */
  .video-row { background: var(--bg3); border: 1px solid var(--border2); border-radius: 5px; margin-bottom: 4px; overflow: hidden; border-left: 3px solid transparent; transition: border-color 0.15s; }
  .video-row.pass3 { border-left-color: var(--source-color); background: color-mix(in srgb, var(--source-color) 7%, var(--bg3)); }
  .video-inner { display: flex; align-items: center; gap: 10px; padding: 9px 12px; }
  .video-title { flex: 1; font-size: 11.5px; color: #cbd5e1; font-weight: 500; line-height: 1.3; }
  .video-row.pass3 .video-title { color: var(--text); }

  /* PASS CHECKBOXES */
  .passes { display: flex; gap: 5px; flex-shrink: 0; }
  .pass-btn { width: 26px; height: 26px; border-radius: 4px; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 8px; font-weight: 700; letter-spacing: 0.05em; color: var(--dim); background: transparent; transition: all 0.15s; font-family: inherit; user-select: none; -webkit-user-select: none; }
  .pass-btn.active { color: white; border-color: transparent; }
  .pass-btn[data-pass="1"].active { background: #6366f1; }
  .pass-btn[data-pass="2"].active { background: #f59e0b; }
  .pass-btn[data-pass="3"].active { background: var(--source-color); }

  /* STATS BAR */
  #stats-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; gap: 16px; flex-shrink: 0; }
  .stat-item { display: flex; align-items: center; gap: 5px; font-size: 9.5px; color: var(--dim); }
  .stat-dot { width: 8px; height: 8px; border-radius: 2px; }
  .stat-label { color: var(--muted); font-weight: 600; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--xdim); font-size: 11px; }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div>
      <div id="app-title">Sketchy Tracker</div>
      <div id="app-subtitle">Micro · Pharm · Path — pass tracking</div>
    </div>
    <div style="text-align:right">
      <div id="progress-pct">0%</div>
      <div id="progress-text">0 / 0</div>
    </div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  <div id="nav-bar">
    <a href="index.html" id="back-link">← Schedule</a>
    <button class="nav-tab" data-source="micro" style="--tab-color: var(--micro)" onclick="setSource('micro')">Sketchy Micro</button>
    <button class="nav-tab" data-source="pharm" style="--tab-color: var(--pharm)" onclick="setSource('pharm')">Sketchy Pharm</button>
    <button class="nav-tab" data-source="path" style="--tab-color: var(--path)" onclick="setSource('path')">Sketchy Path</button>
  </div>
</div>

<div id="stats-bar">
  <div class="stat-item"><div class="stat-dot" style="background:#6366f1"></div><span class="stat-label">1P:</span><span id="stat-1p">0</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#f59e0b"></div><span class="stat-label">2P:</span><span id="stat-2p">0</span></div>
  <div class="stat-item"><div class="stat-dot" style="background:#10b981"></div><span class="stat-label">3P:</span><span id="stat-3p">0</span></div>
  <div class="stat-item" style="margin-left:auto"><span id="stat-total" style="color:var(--muted);font-weight:600"></span></div>
</div>

<div id="scroll">
  <div id="units"></div>
</div>

// ── STATE ──────────────────────────────────────────────────────────────────────
const sk = JSON.parse(localStorage.getItem("sk-passes") || "{}");
let activeSource = "micro";

function saveState() { localStorage.setItem("sk-passes", JSON.stringify(sk)); }

function getKey(source, unit, title) { return `${source}||${unit}||${title}`; }
function getPasses(source, unit, title) { return sk[getKey(source, unit, title)] || 0; }
function setPasses(source, unit, title, val) {
  sk[getKey(source, unit, title)] = val;
  saveState();
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function setSource(src) {
  activeSource = src;
  document.querySelectorAll(".nav-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.source === src);
  });
  renderUnits();
}

function renderUnits() {
  const src = DATA[activeSource];
  const color = src.color;
  document.documentElement.style.setProperty("--source-color", color);
  document.getElementById("progress-pct").style.color = color;
  document.getElementById("progress-fill").style.background = color;

  let total = 0, done1 = 0, done2 = 0, done3 = 0;
  Object.values(src.units).forEach(vids => {
    total += vids.length;
    vids.forEach(v => {
      const p = getPasses(activeSource, "?", v);
      if (p >= 1) done1++;
      if (p >= 2) done2++;
      if (p >= 3) done3++;
    });
  });

  document.getElementById("progress-pct").textContent = total ? Math.round(done1 / total * 100) + "%" : "0%";
  document.getElementById("progress-text").textContent = `${done1} / ${total}`;
  document.getElementById("progress-fill").style.width = total ? (done1 / total * 100) + "%" : "0%";
  document.getElementById("stat-1p").textContent = done1;
  document.getElementById("stat-2p").textContent = done2;
  document.getElementById("stat-3p").textContent = done3;
  document.getElementById("stat-total").textContent = `${total} videos`;

  const container = document.getElementById("units");
  container.innerHTML = "";

  Object.entries(src.units).forEach(([unit, videos]) => {
    const unitKey = unit;
    const unitDone = videos.filter(v => getPasses(activeSource, unitKey, v) >= 1).length;

    const group = document.createElement("div");
    group.className = "unit-group";

    const header = document.createElement("div");
    header.className = "unit-header";
    header.style.setProperty("--source-color", color);
    header.innerHTML = `
      <div class="unit-badge" style="--source-color:${color}">${unit}</div>
      <span class="unit-count">${unitDone}/${videos.length}</span>
      <div style="flex:1;min-width:60px"><div class="unit-progress-bar"><div class="unit-progress-fill" style="width:${videos.length ? unitDone/videos.length*100 : 0}%;background:${color}"></div></div></div>
    `;
    group.appendChild(header);

    videos.forEach(title => {
      const passes = getPasses(activeSource, unitKey, title);
      const row = document.createElement("div");
      row.className = "video-row" + (passes >= 3 ? " pass3" : "");
      row.style.setProperty("--source-color", color);

      row.innerHTML = `
        <div class="video-inner">
          <div class="video-title">${title}</div>
          <div class="passes">
            <button class="pass-btn ${passes >= 1 ? 'active' : ''}" data-pass="1" title="1st pass">1P</button>
            <button class="pass-btn ${passes >= 2 ? 'active' : ''}" data-pass="2" title="2nd pass">2P</button>
            <button class="pass-btn ${passes >= 3 ? 'active' : ''}" data-pass="3" title="3rd pass">3P</button>
          </div>
        </div>
      `;

      row.querySelectorAll(".pass-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const p = parseInt(btn.dataset.pass);
          const cur = getPasses(activeSource, unitKey, title);
          // Toggle: clicking current max pass turns it off; else advance to that pass
          const newVal = cur >= p ? p - 1 : p;
          setPasses(activeSource, unitKey, title, newVal);
          renderUnits();
        });
      });

      group.appendChild(row);
    });

    container.appendChild(group);
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────────
setSource("micro");
</script>
